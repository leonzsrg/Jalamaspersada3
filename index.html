
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Jala Mas Persada - Spesialis AC Semarang</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #0a74da;
      --primary-dark: #0558a8;
      --primary-light: #3d9aff;
      --accent: #00c6fb;
      --dark: #0b1f3a;
      --dark-2: #112842;
      --text: #2e4a6b;
      --text-light: #6b8aad;
      --bg: #f0f6ff;
      --white: #ffffff;
      --card-bg: rgba(255,255,255,0.85);
      --shadow: 0 8px 40px rgba(10,116,218,0.12);
      --radius: 20px;
      --radius-sm: 12px;
      --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ---- HEADER ---- */
    .header {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(10,116,218,0.10);
      box-shadow: 0 2px 24px rgba(10,116,218,0.07);
      transition: box-shadow var(--transition);
    }

    .nav {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 68px;
    }

    .nav__logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.02em;
    }

    .logo-icon-placeholder {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.1rem;
      flex-shrink: 0;
    }

    .nav__list {
      display: flex; list-style: none; gap: 0.25rem; align-items: center;
    }

    .nav__link {
      text-decoration: none;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .nav__link:hover,
    .nav__link.active-link {
      background: rgba(10,116,218,0.09);
      color: var(--primary);
    }

    .nav__toggle {
      display: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: var(--dark);
    }

    .nav__close {
      display: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: var(--dark);
      position: absolute;
      top: 1rem; right: 1.5rem;
    }

    /* ---- UTILITIES ---- */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

    .section { padding: 80px 0; }

    .section__title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.15;
      text-align: center;
      margin-bottom: 3rem;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .button {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      box-shadow: 0 4px 20px rgba(10,116,218,0.3);
      letter-spacing: -0.01em;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(10,116,218,0.45);
      filter: brightness(1.08);
    }

    /* ---- HOME ---- */
    .home {
      min-height: 100vh;
      background: linear-gradient(160deg, #e8f4ff 0%, #f0f9ff 40%, #dbeeff 100%);
      position: relative;
      overflow: hidden;
      padding-top: 68px;
      display: flex; align-items: center;
    }

    .home::before {
      content: '';
      position: absolute; top: -120px; right: -120px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,198,251,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .home::after {
      content: '';
      position: absolute; bottom: -80px; left: -80px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(10,116,218,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .home__container {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 4rem; align-items: center;
      position: relative; z-index: 1;
      padding: 60px 2rem;
    }

    .home__image {
      display: flex; justify-content: center; align-items: center;
    }

    .home__img {
      max-width: 100%; width: 440px;
      border-radius: var(--radius);
      box-shadow: 0 24px 64px rgba(10,116,218,0.22);
      transform: rotate(-1.5deg);
      transition: transform 0.4s ease;
    }

    .home__img:hover { transform: rotate(0deg) scale(1.02); }

    .home__data {
      display: flex; flex-direction: column; gap: 2rem;
    }

    .home__subtitle {
      font-size: 0.95rem; font-weight: 700;
      color: var(--primary);
      text-transform: uppercase; letter-spacing: 0.12em;
      display: flex; align-items: center; gap: 8px;
    }

    .home__subtitle::before {
      content: '';
      width: 28px; height: 3px;
      background: var(--primary);
      border-radius: 2px;
      display: inline-block;
    }

    .home__title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 800;
      line-height: 1.1;
      color: var(--dark);
      letter-spacing: -0.03em;
    }

    .home__title span {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .home__description {
      color: var(--text-light);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .home__badges {
      display: flex; flex-wrap: wrap; gap: 10px;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: white;
      border: 1.5px solid rgba(10,116,218,0.15);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary);
    }

    .badge i { font-size: 0.9rem; }

    /* ---- LAYANAN ---- */
    .layanan {
      background: var(--white);
      padding: 80px 0;
    }

    .layanan__grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
    }

    .layanan__card {
      background: linear-gradient(145deg, #f7fbff, #eef5ff);
      border: 1.5px solid rgba(10,116,218,0.1);
      border-radius: var(--radius);
      padding: 2rem;
      transition: all var(--transition);
      position: relative; overflow: hidden;
    }

    .layanan__card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0; transition: opacity var(--transition);
    }

    .layanan__card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow);
      border-color: rgba(10,116,218,0.25);
    }

    .layanan__card:hover::before { opacity: 1; }

    .layanan__icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, rgba(10,116,218,0.12), rgba(0,198,251,0.12));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: var(--primary);
      margin-bottom: 1.2rem;
    }

    .layanan__title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      color: var(--dark);
      margin-bottom: 0.6rem;
    }

    .layanan__desc {
      font-size: 0.88rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ---- TENTANG KAMI ---- */
    .tentangkami {
      background: linear-gradient(160deg, #0b1f3a 0%, #0a3060 100%);
      padding: 80px 0;
      position: relative; overflow: hidden;
    }

    .tentangkami::before {
      content: '';
      position: absolute; top: -200px; right: -200px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,198,251,0.08) 0%, transparent 70%);
    }

    .tentangkami .section__title {
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .about__container {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
    }

    .about__content { color: rgba(255,255,255,0.85); }

    .about__description {
      font-size: 1.05rem; line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .about__description strong { color: var(--accent); }

    .about__stats {
      display: flex; gap: 2rem;
    }

    .about__stat {
      display: flex; flex-direction: column; gap: 4px;
    }

    .stat__number {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem; font-weight: 800;
      color: white;
      line-height: 1;
    }

    .stat__label {
      font-size: 0.82rem; font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    .about__visual {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    }

    .about__feat {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      padding: 1.4rem;
      transition: all var(--transition);
    }

    .about__feat:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(0,198,251,0.3);
    }

    .about__feat i {
      font-size: 1.5rem; color: var(--accent); margin-bottom: 0.6rem; display: block;
    }

    .about__feat h4 {
      font-size: 0.9rem; font-weight: 700; color: white; margin-bottom: 0.3rem;
    }

    .about__feat p {
      font-size: 0.78rem; color: rgba(255,255,255,0.5); line-height: 1.5;
    }

    /* ---- LOKASI ---- */
    .lokasi {
      background: var(--white); padding: 80px 0;
    }

    .lokasi__container {
      display: grid; grid-template-columns: 1fr 1.5fr; gap: 3rem; align-items: start;
    }

    .lokasi__info {
      display: flex; flex-direction: column; gap: 1.5rem;
    }

    .lokasi__address {
      background: linear-gradient(145deg, #f0f7ff, #e6f2ff);
      border: 1.5px solid rgba(10,116,218,0.15);
      border-radius: var(--radius);
      padding: 1.8rem;
    }

    .lokasi__address i {
      font-size: 1.6rem; color: var(--primary); margin-bottom: 0.8rem; display: block;
    }

    .lokasi__address h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--dark); margin-bottom: 0.5rem;
    }

    .lokasi__address p {
      font-size: 0.9rem; color: var(--text-light); line-height: 1.6;
    }

    .lokasi__address strong { color: var(--text); }

    .lokasi__map iframe {
      width: 100%; height: 380px;
      border-radius: var(--radius);
      border: none;
      box-shadow: var(--shadow);
    }

    /* ---- PENCAPAIAN ---- */
    .pencapaian {
      background: var(--bg); padding: 80px 0;
    }

    .pencapaian__container {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem;
    }

    .pencapaian__card {
      background: var(--white);
      border: 1.5px solid rgba(10,116,218,0.1);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all var(--transition);
    }

    .pencapaian__card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow);
      border-color: rgba(10,116,218,0.25);
    }

    .pencapaian__content { padding: 1rem; text-align: center; }

    .pencapaian__img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: var(--radius-sm);
      margin-bottom: 0.8rem;
      background: #eef5ff;
    }

    /* Placeholder for missing images */
    .pencapaian__img[src$=".png"]:not([src^="data"]) {
      background: linear-gradient(135deg, #dbeeff, #f0f7ff);
    }

    .pencapaian__title {
      font-size: 0.84rem; font-weight: 700; color: var(--dark);
      line-height: 1.4;
    }

    /* ---- KONTAK ---- */
    .kontak {
      background: linear-gradient(160deg, #0b1f3a, #0a3060);
      padding: 80px 0;
    }

    .kontak .section__title {
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
    }

    .kontak__container {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
    }

    .kontak__card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      transition: all var(--transition);
      overflow: hidden;
    }

    .kontak__card:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(0,198,251,0.3);
      transform: translateY(-4px);
    }

    .kontak__content {
      padding: 2.5rem; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
    }

    .kontak__icon {
      font-size: 2.2rem; color: var(--accent);
      width: 60px; height: 60px;
      background: rgba(0,198,251,0.12);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }

    .kontak__title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700; color: white;
    }

    .kontak__description {
      font-size: 0.9rem; color: rgba(255,255,255,0.6);
    }

    .kontak__button {
      margin-top: 0.5rem;
      padding: 11px 24px;
      font-size: 0.88rem;
    }

    /* ---- PRODUK ---- */
    .productunggulan {
      background: var(--white); padding: 80px 0;
    }

    .products__container {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem;
    }

    .product__card {
      background: linear-gradient(145deg, #f7fbff, #eef5ff);
      border: 1.5px solid rgba(10,116,218,0.1);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all var(--transition);
    }

    .product__card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow);
      border-color: rgba(10,116,218,0.3);
    }

    .product__content { padding: 1.5rem; text-align: center; }

    .product__img {
      width: 100%; aspect-ratio: 1;
      object-fit: contain;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      background: white;
      padding: 1rem;
    }

    .product__title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--dark);
      margin-bottom: 0.3rem;
    }

    .product__description {
      font-size: 0.82rem; color: var(--primary); font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* ---- FOOTER ---- */
    footer {
      background: #071526;
      padding: 2rem;
      text-align: center;
    }

    .footer__copy {
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 1024px) {
      .pencapaian__container { grid-template-columns: repeat(3, 1fr); }
      .about__container { grid-template-columns: 1fr; }
      .about__visual { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 768px) {
      .nav__menu {
        position: fixed; top: 0; right: -100%;
        width: 260px; height: 100vh;
        background: white;
        flex-direction: column;
        padding: 5rem 2rem 2rem;
        box-shadow: -8px 0 40px rgba(0,0,0,0.15);
        transition: right var(--transition);
        display: flex;
      }

      .nav__menu.show-menu { right: 0; }

      .nav__list { flex-direction: column; gap: 0.5rem; }

      .nav__link { font-size: 1rem; padding: 12px 16px; }

      .nav__close, .nav__toggle { display: block; }

      .home__container { grid-template-columns: 1fr; gap: 2rem; padding: 40px 1.5rem; }
      .home__image { order: -1; }
      .home__img { width: 100%; max
